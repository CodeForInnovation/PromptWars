version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nexusflow-backend:prod
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - FRONTEND_URL=http://localhost:3000
    restart: always
    networks:
      - nexusflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nexusflow-frontend:prod
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    restart: always
    networks:
      - nexusflow-network

networks:
  nexusflow-network:
    driver: bridge
